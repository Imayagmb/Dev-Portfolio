<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo central -->
  <circle cx="100" cy="100" r="10" fill="#61DAFB"></circle>

  <!-- Elipses -->
  <g stroke="#61DAFB" stroke-width="4" fill="none">
    <ellipse cx="100" cy="100" rx="60" ry="25"></ellipse>
    <ellipse cx="100" cy="100" rx="60" ry="25" transform="rotate(60 100 100)"></ellipse>
    <ellipse cx="100" cy="100" rx="60" ry="25" transform="rotate(120 100 100)"></ellipse>
  </g>
</svg>